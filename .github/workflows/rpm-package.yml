name: RPM Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-rpm:
    name: Build SRPM and RPM
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install packaging dependencies
        run: |
          set -euo pipefail
          dnf -y install \
            curl \
            gcc \
            git \
            golang \
            redhat-rpm-config \
            rpm-build \
            rsync \
            tar \
            which
          dnf clean all

      - name: Resolve package version
        id: version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release="1"
          else
            version="0.0.0"
            release="0.$(date -u +%Y%m%d%H%M%S)"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release=${release}" >> "${GITHUB_OUTPUT}"

      - name: Vendor Go modules
        run: go mod vendor

      - name: Create source archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          name="caracal-software-installer"
          topdir="${PWD}/rpmbuild"
          sourcedir="${topdir}/SOURCES"
          specdir="${topdir}/SPECS"
          tempdir="$(mktemp -d)"
          srcroot="${tempdir}/${name}-${VERSION}"

          install -d "${sourcedir}" "${specdir}" "${topdir}/SRPMS" "${topdir}/RPMS"
          cp packaging/caracal-software-installer.spec "${specdir}/"

          mkdir -p "${srcroot}"
          rsync -a \
            --exclude '.git' \
            --exclude '.github/workflows' \
            --exclude 'dist' \
            --exclude 'rpmbuild' \
            ./ "${srcroot}/"

          tar -C "${tempdir}" -czf "${sourcedir}/${name}-${VERSION}.tar.gz" "${name}-${VERSION}"

      - name: Build source RPM
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          set -euo pipefail

          rpmbuild -bs rpmbuild/SPECS/caracal-software-installer.spec \
            --define "_topdir ${PWD}/rpmbuild" \
            --define "version_override ${VERSION}" \
            --define "release_override ${RELEASE}"

      - name: Build binary RPM
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          set -euo pipefail

          rpmbuild -ba rpmbuild/SPECS/caracal-software-installer.spec \
            --define "_topdir ${PWD}/rpmbuild" \
            --define "version_override ${VERSION}" \
            --define "release_override ${RELEASE}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caracal-software-installer-rpms
          path: |
            rpmbuild/SRPMS/*.src.rpm
            rpmbuild/RPMS/**/*.rpm
          if-no-files-found: error

      - name: Attach RPM artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rpmbuild/SRPMS/*.src.rpm
            rpmbuild/RPMS/**/*.rpm

      - name: Trigger COPR webhook
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${COPR_WEBHOOK_URL}" ]]; then
            echo "COPR_WEBHOOK_URL is not set; skipping COPR trigger."
            exit 0
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{}' \
            "${COPR_WEBHOOK_URL}"
